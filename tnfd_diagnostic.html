<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>TNFD 진단 도구</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--bg:#f5f6f8;--card:#fff;--bd:#e3e6eb;--ink:#1f2430;--muted:#6b7280;
        --met:#16a34a;--partial:#f59e0b;--not:#dc2626;--accent:#2563eb;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,'Noto Sans KR',sans-serif;
       background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
  header{background:#0f172a;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
  header h1{font-size:15px;margin:0;flex:1}
  header button,header select,header input{font-size:12px;padding:5px 10px;border-radius:4px;border:1px solid #334155;background:#1e293b;color:#fff}
  header input[type=password]{width:280px}
  main{display:grid;grid-template-columns:380px 1fr 420px;gap:10px;padding:10px;height:calc(100vh - 50px)}
  .panel{background:var(--card);border:1px solid var(--bd);border-radius:6px;overflow:auto;padding:12px}
  .panel h2{font-size:13px;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
  #pdfwrap{padding:0;background:#525659;display:flex;flex-direction:column}
  #pdftoolbar{padding:6px 10px;background:#333;color:#fff;display:flex;gap:8px;align-items:center;font-size:12px}
  #pdfcanvasarea{flex:1;overflow:auto;padding:10px;text-align:center}
  #pdfcanvasarea canvas{box-shadow:0 2px 8px rgba(0,0,0,.3);max-width:100%}
  .drop{border:2px dashed #94a3b8;border-radius:8px;padding:30px;text-align:center;color:var(--muted);cursor:pointer}
  .drop.hover{border-color:var(--accent);background:#eff6ff}
  .scorecard{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
  .sc{padding:8px;border-radius:4px;text-align:center;font-size:11px}
  .sc b{display:block;font-size:18px;margin-bottom:2px}
  .sc.total{background:#eef2ff;color:#3730a3}
  .sc.met{background:#dcfce7;color:#166534}
  .sc.partial{background:#fef3c7;color:#92400e}
  .sc.not{background:#fee2e2;color:#991b1b}
  .area{margin-bottom:8px;border:1px solid var(--bd);border-radius:4px}
  .area-h{padding:6px 10px;background:#f8fafc;cursor:pointer;display:flex;justify-content:space-between;font-weight:600;font-size:12px}
  .area-b{display:none;padding:4px 0}
  .area.open .area-b{display:block}
  .item{padding:4px 10px}
  .item-name{font-size:11px;color:var(--muted);margin:2px 0}
  .guid{padding:5px 10px 5px 22px;border-left:3px solid transparent;cursor:pointer;font-size:11.5px;display:flex;gap:6px;align-items:center}
  .guid:hover{background:#f8fafc}
  .guid.sel{background:#eff6ff;border-left-color:var(--accent)}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot.met{background:var(--met)}.dot.partial{background:var(--partial)}.dot.not{background:var(--not)}.dot.none{background:#cbd5e1}
  .gname{flex:1}
  .detail h3{font-size:13px;margin:0 0 4px}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:8px}
  .badge.met{background:#dcfce7;color:#166534}.badge.partial{background:#fef3c7;color:#92400e}.badge.not{background:#fee2e2;color:#991b1b}.badge.none{background:#e2e8f0;color:#475569}
  .field{margin-bottom:10px;padding:8px;background:#f8fafc;border-radius:4px;font-size:12px}
  .field b{display:block;color:var(--muted);font-size:11px;margin-bottom:3px;font-weight:600;text-transform:uppercase}
  .excerpt{background:#fef9c3;padding:6px;border-radius:3px;border-left:3px solid #eab308;font-style:italic}
  button.primary{background:var(--accent);border-color:var(--accent);cursor:pointer}
  button:disabled{opacity:.5;cursor:not-allowed}
  .progress{height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden;margin:8px 0}
  .progress>div{height:100%;background:var(--accent);transition:width .3s}
  .log{font-family:monospace;font-size:10px;color:var(--muted);max-height:80px;overflow:auto;background:#f8fafc;padding:4px;border-radius:3px}
  .pdfhl{position:absolute;background:rgba(234,179,8,.35);pointer-events:none;border:1px solid #ca8a04}
</style>
</head>
<body>
<header>
  <h1 data-ko="🌿 TNFD 보고서 진단 도구" data-en="🌿 TNFD Report Diagnostic Tool">🌿 TNFD 보고서 진단 도구</h1>
  <span data-ko="API 키:" data-en="API Key:">API 키:</span>
  <input id="apikey" type="password" placeholder="sk-ant-..." />
  <span data-ko="산업:" data-en="Industry:">산업:</span>
  <input id="industry" placeholder="예: 식품" style="width:120px" />
  <select id="lang"><option value="ko">한국어</option><option value="en">English</option></select>
  <button id="exportBtn" disabled data-ko="엑셀 내보내기" data-en="Export Excel">엑셀 내보내기</button>
</header>

<main>
  <div class="panel" id="leftPanel">
    <h2 data-ko="진단 지침 (125개)" data-en="Guidance (125 items)">진단 지침 (125개)</h2>
    <div class="scorecard">
      <div class="sc total"><b id="scTotal">0</b><span data-ko="전체" data-en="Total">전체</span></div>
      <div class="sc met"><b id="scMet">0</b><span data-ko="충족" data-en="Met">충족</span></div>
      <div class="sc partial"><b id="scPartial">0</b><span data-ko="부분" data-en="Partial">부분</span></div>
      <div class="sc not"><b id="scNot">0</b><span data-ko="미충족" data-en="Not Met">미충족</span></div>
    </div>
    <div id="tree"></div>
  </div>

  <div class="panel" id="pdfwrap">
    <div id="pdftoolbar">
      <button id="prevPg">◀</button>
      <span><span id="pgNum">0</span> / <span id="pgTotal">0</span></span>
      <button id="nextPg">▶</button>
      <span style="margin-left:auto" id="pdfStatus" data-ko="PDF를 업로드하세요" data-en="Upload a PDF">PDF를 업로드하세요</span>
    </div>
    <div id="pdfcanvasarea">
      <div style="padding:60px 20px">
        <div id="dropzone" class="drop" style="background:#fff;color:#1f2430">
          <div style="font-size:36px;margin-bottom:8px">📄</div>
          <div data-ko="PDF 파일을 드롭하거나 클릭하여 업로드" data-en="Drop PDF here or click to upload">PDF 파일을 드롭하거나 클릭하여 업로드</div>
          <input id="fileinput" type="file" accept="application/pdf" style="display:none" />
        </div>
        <div style="text-align:center;margin-top:20px">
          <button class="primary" id="diagBtn" disabled data-ko="🔍 진단 시작" data-en="🔍 Start Diagnosis">🔍 진단 시작</button>
        </div>
        <div class="progress" style="display:none" id="progressBar"><div style="width:0%"></div></div>
        <div class="log" id="log"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2 data-ko="진단 상세" data-en="Diagnosis Detail">진단 상세</h2>
    <div id="detail" style="color:var(--muted);font-size:12px" data-ko="좌측에서 지침을 선택하세요" data-en="Select a guidance on the left">좌측에서 지침을 선택하세요</div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ============== 125개 지침 스키마 ============== */

function $(s){return document.querySelector(s)}

function L(o){return typeof o==='object'?o[lang]:o}
function allGuidances(){
  const out=[];
  SCHEMA.forEach(a=>a.items.forEach(i=>i.guidances.forEach(g=>{
    out.push({id:`${i.code}__${g.sub}`, area:a.area, areaName:a.name, item:i.code, itemName:i.name, sub:g.sub, name:g.name});
  })));
  return out;
}
const ALL = allGuidances();

// id 정규화: Claude가 언더바 1개로 반환해도 흡수
function normalizeId(raw){
  if(!raw) return raw;
  let s = String(raw).trim();
  // 항목코드와 지침코드 사이의 단일 _를 __로
  // 항목코드 끝 패턴: G-A.1, M-C.8, R-Ai.1, R-Aii.5 등 → 끝이 ".숫자"
  // 그 뒤에 _ 1개나 2개가 오고 지침번호(N.N)
  s = s.replace(/^([A-Z]+(?:-[A-Za-z()i]+)?\.\d+)_+(\d+\.\d+)$/, '$1__$2');
  return s;
}

function renderTree(){
  const tree = $('#tree');
  tree.innerHTML = '';
  SCHEMA.forEach(area=>{
    const a = document.createElement('div'); a.className='area open';
    const total = area.items.reduce((s,i)=>s+i.guidances.length,0);
    const met = area.items.reduce((s,i)=>s+i.guidances.filter(g=>guidRes[`${i.code}__${g.sub}`]?.status==='met').length,0);
    a.innerHTML = `<div class="area-h"><span>${area.area}. ${L(area.name)}</span><span>${met}/${total}</span></div><div class="area-b"></div>`;
    a.querySelector('.area-h').onclick = ()=>a.classList.toggle('open');
    const b = a.querySelector('.area-b');
    area.items.forEach(item=>{
      const it = document.createElement('div'); it.className='item';
      it.innerHTML = `<div class="item-name">${item.code} · ${L(item.name)}</div>`;
      item.guidances.forEach(g=>{
        const id = `${item.code}__${g.sub}`;
        const r = guidRes[id];
        const status = r?.status || 'none';
        const gd = document.createElement('div');
        gd.className = 'guid' + (selectedId===id?' sel':'');
        gd.innerHTML = `<span class="dot ${status}"></span><span class="gname">${g.sub} ${L(g.name)}</span>`;
        gd.onclick = ()=>{ selectedId=id; renderTree(); renderDetail(id); if(r?.page) gotoPage(r.page); };
        it.appendChild(gd);
      });
      b.appendChild(it);
    });
    tree.appendChild(a);
  });
  updateScorecard();
}

  const vals = Object.values(guidRes);
  $('#scTotal').textContent = ALL.length;
  $('#scMet').textContent = vals.filter(v=>v.status==='met').length;

                       en:{met:'Met',partial:'Partial',not:'Not Met',none:'Not Assessed'}}[lang];

const dz = $('#dropzone'), fi = $('#fileinput');
dz.onclick = ()=>fi.click();
['dragover','dragleave','drop'].forEach(ev=>dz.addEventListener(ev, e=>{
  e.preventDefault();
  if(ev==='dragover') dz.classList.add('hover');
  else dz.classList.remove('hover');
  if(ev==='drop' && e.dataTransfer.files[0]) loadPdf(e.dataTransfer.files[0]);
}));

async function loadPdf(file){
  log(`PDF 로드: ${file.name} (${(file.size/1024).toFixed(0)}KB)`);
  const buf = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({data:buf}).promise;
  pdfPages = pdfDoc.numPages;
  $('#pgTotal').textContent = pdfPages;
  pageTexts = [];
  let allText = '';
  for(let i=1;i<=pdfPages;i++){
    const page = await pdfDoc.getPage(i);
    const tc = await page.getTextContent({normalizeWhitespace:true});
    const t = tc.items.map(it=>it.str).join(' ');
    pageTexts.push(t);
    allText += `\n===p${i}===\n${t}`;
  }
  pdfText = allText;
  log(`텍스트 추출: ${allText.length.toLocaleString()}자`);
  if(allText.length < 500){
    alert(lang==='ko'?'⚠️ 텍스트 추출 실패 — 스캔본 PDF인 경우 OCR 후 재업로드하세요':'⚠️ Text extraction failed — OCR required for scanned PDFs');
  }
  $('#pdfStatus').textContent = file.name;
  $('#diagBtn').disabled = false;
  pdfPage = 1;
  renderPdfPage();
}

async function renderPdfPage(){
  if(!pdfDoc) return;
  const area = $('#pdfcanvasarea');
  area.innerHTML = '';
  const page = await pdfDoc.getPage(pdfPage);
  const vp = page.getViewport({scale:1.3});
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  area.appendChild(canvas);
  await page.render({canvasContext:canvas.getContext('2d'), viewport:vp}).promise;
  $('#pgNum').textContent = pdfPage;
}
function gotoPage(n){ if(!pdfDoc) return; pdfPage=Math.max(1,Math.min(pdfPages,n)); renderPdfPage(); }
$('#prevPg').onclick = ()=>gotoPage(pdfPage-1);
$('#nextPg').onclick = ()=>gotoPage(pdfPage+1);

const BATCHES = [

function buildSystemPrompt(industry){
  return `당신은 TNFD 전문 ESG 컨설턴트입니다. 산업: ${industry||'일반'}

## 판정 기준 (엄격하게 준수)

### met (충족) — 다음 중 하나 이상 해당:
- 해당 지침 요건을 명시적으로 기술 (문단, 표, 도식, 각주 등 형식 무관)
- 수치/정량 데이터 없어도 되나, 해당 주제를 다루고 있음이 명확
- 조직 정책, 프로세스, 시스템 존재를 공시

### partial (부분충족) — 다음 중 하나 이상 해당:
- 관련 주제를 언급하나 요건의 50% 미만만 충족
- 매우 일반적이고 추상적인 서술만 존재
- 계획만 있고 실제 이행 내용 없음

### not (미충족) — 다음에만 해당:
- 보고서 전체에서 해당 지침 관련 내용을 찾을 수 없음
- 완전히 다른 주제의 내용만 존재

## 판단 순서
1. 보고서에서 해당 지침 관련 섹션을 먼저 탐색
2. 관련 문장이 1개라도 있으면 최소 "partial"
3. "not"은 마지막 수단으로만 사용

## excerpt 규칙
- 반드시 보고서 텍스트에서 그대로 복사 (paraphrase 금지)
- 최소 15자, 최대 100자
- 문장 중간에서 자르지 말 것
- 해당 내용이 없으면 빈 문자열 ""

## id 형식 (절대 준수)
항목코드__지침코드 (언더바 정확히 2개)
예: G-A.1__1.1, M-C.8__8.3

## 응답 형식 (순수 JSON, 다른 텍스트 금지)
{"results":[{
  "id":"G-A.1__1.1",
  "status":"met",
  "score":85,
  "page":6,
  "excerpt":"원문 그대로 복사한 문장",
  "evidence":"왜 이렇게 판정했는지 근거",
  "rec":"개선 권고 (met이면 빈 문자열)",
  "notReason":"미충족 사유 (not인 경우만)"
}]}`;
}

function buildUserPrompt(targets, docText){
  const lines = targets.map(g=>`[${g.id}] ${g.area} > ${L(g.itemName)} > ${g.sub} ${L(g.name)}`).join('\n');
  const text = docText.slice(0, 75000);
  return `다음은 기업의 TNFD 보고서입니다:\n${text}\n\n========================================\n위 보고서를 꼼꼼히 읽고 아래 TNFD 세부 지침을 진단하세요.\n관련 내용이 조금이라도 있으면 반드시 "met" 또는 "partial"로 판정하세요.\n\n${lines}\n\n반드시 위 ${targets.length}개 지침 전부의 결과를 JSON으로 반환하세요.`;
}

async function callClaude(apiKey, system, user, maxTokens){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens: maxTokens,
      system, messages:[{role:'user',content:user}]
    })
  });
  if(!res.ok) throw new Error('API '+res.status+': '+(await res.text()));
  const j = await res.json();
  return j.content[0].text;
}

function parseJsonLoose(t){
  // 코드펜스 제거
  t = t.replace(/^```(?:json)?\s*/i,'').replace(/```\s*$/,'');
  // 첫 { 부터 마지막 } 까지
  const a = t.indexOf('{'), b = t.lastIndexOf('}');
  if(a>=0 && b>a) t = t.slice(a, b+1);
  return JSON.parse(t);
}

$('#diagBtn').onclick = async ()=>{
  const apiKey = $('#apikey').value.trim();
  if(!apiKey){ alert('API 키를 입력하세요'); return; }
  if(!pdfText){ alert('PDF를 먼저 업로드하세요'); return; }
  const industry = $('#industry').value.trim();
  $('#diagBtn').disabled = true;
  $('#progressBar').style.display='block';
  const bar = $('#progressBar').firstElementChild;

  for(let bi=0; bi<BATCHES.length; bi++){
    const batch = BATCHES[bi];
    const targets = ALL.filter(g=>batch.keys.includes(g.area));
    log(`배치 ${bi+1}/${BATCHES.length}: ${batch.label} (${targets.length}개)`);
    bar.style.width = ((bi/BATCHES.length)*100)+'%';
    try{
      const text = await callClaude(
        apiKey,
        buildSystemPrompt(industry),
        buildUserPrompt(targets, pdfText),
        8000
      );
      const parsed = parseJsonLoose(text);
      let n = 0;
      (parsed.results||[]).forEach(r=>{
        const id = normalizeId(r.id);
        guidRes[id] = {...r, id};
        n++;
      });
      log(`  → ${n}개 수신 (요청 ${targets.length})`);
      renderTree();
    }catch(e){
      log(`  ✗ 오류: ${e.message}`);
      alert('진단 오류: '+e.message);
    }
  }
  bar.style.width='100%';
  $('#diagBtn').disabled = false;
  $('#exportBtn').disabled = false;
  log('진단 완료');
};

/* ============== 엑셀 내보내기 ============== */
$('#exportBtn').onclick = ()=>{
  const rows = ALL.map(g=>{
    const r = guidRes[g.id] || {};
    return {
      ID: g.id, 영역: g.area, 항목코드: g.item, 항목명: L(g.itemName),
      지침코드: g.sub, 지침명: L(g.name),
      판정: r.status||'', 점수: r.score||'', 페이지: r.page||'',
      원문발췌: r.excerpt||'', 판정근거: r.evidence||'',
      미충족사유: r.notReason||'', 개선권고: r.rec||''
    };
  });
  const summary = [
    {구분:'전체', 개수:ALL.length},
    {구분:'충족(met)', 개수:Object.values(guidRes).filter(v=>v.status==='met').length},
    {구분:'부분(partial)', 개수:Object.values(guidRes).filter(v=>v.status==='partial').length},
    {구분:'미충족(not)', 개수:Object.values(guidRes).filter(v=>v.status==='not').length},
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Summary');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Diagnosis');
  XLSX.writeFile(wb, `TNFD_diagnosis_${new Date().toISOString().slice(0,10)}.xlsx`);
};

/* ============== 초기 렌더 ============== */
log('총 지침: '+ALL.length+'개');
renderTree();
</script>
</body>
</html>
